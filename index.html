<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Escape Room WWII</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b132b;
color:white;
text-align:center;
overflow:hidden;
}

#schermata{
padding:20px;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

img{
width:70%;
max-height:300px;
border-radius:12px;
margin:10px;
}

button{
padding:12px;
margin:8px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
background:#3a86ff;
color:white;
}

button:hover{
background:#265ecf;
}

.box{
background:#1c2541;
padding:15px;
border-radius:12px;
margin:auto;
max-width:800px;
}

.spiegazione{
background:#3a0ca3;
padding:10px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="schermata"></div>

<script>

const synth = speechSynthesis;

function parla(testo){
synth.cancel();
let u = new SpeechSynthesisUtterance(testo);
u.lang="it-IT";
synth.speak(u);
}

document.body.onclick=()=>synth.cancel();

//////////////// INTRO //////////////////

function intro(){

document.getElementById("schermata").innerHTML=`

<div class="box">
<h1>🕵️ Escape Room Storica</h1>

<p>
Sei rimasto bloccato nel passato!<br>
Per tornare a casa devi superare
10 prove sulla Seconda Guerra Mondiale.
</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/German_troops_in_Poland_1939.jpg">

<br>
<button onclick="inizia()">INIZIA MISSIONE</button>
<button onclick="parlaIntro()">🔊 Ascolta</button>

</div>
`;
}

function parlaIntro(){
parla("Benvenuto. Devi risolvere le prove storiche per tornare nel presente.");
}

//////////////// DOMANDE //////////////////

let i=0;

const quiz=[

{
domanda:"Quando iniziò la Seconda Guerra Mondiale?",
img:"https://upload.wikimedia.org/wikipedia/commons/a/a8/German_troops_in_Poland_1939.jpg",
opzioni:["1918","1939","1945"],
corretta:1,
aiuto:"Guerra mondiale significa guerra tra molti paesi."
},

{
domanda:"Chi guidava la Germania nazista?",
img:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Adolf_Hitler_1938.jpg",
opzioni:["Hitler","Napoleone","Cesare"],
corretta:0,
aiuto:"Nazista = persona che seguiva un'idea politica violenta e razzista."
},

{
domanda:"Quale paese fu attaccato per primo?",
img:"https://upload.wikimedia.org/wikipedia/commons/1/16/Bundesarchiv_Bild_101I-121-0011-22%2C_Polen%2C_Infanterie_im_Vormarsch.jpg",
opzioni:["Francia","Polonia","Spagna"],
corretta:1,
aiuto:"Invadere significa entrare con l'esercito."
},

{
domanda:"Quale attacco fece entrare gli USA in guerra?",
img:"https://upload.wikimedia.org/wikipedia/commons/1/1c/USS_Arizona_burning.jpg",
opzioni:["Pear Harbor","Roma","Londra"],
corretta:0,
aiuto:"Base militare = luogo dove stanno navi e soldati."
},

{
domanda:"Dove sbarcarono gli Alleati nel 1944?",
img:"https://upload.wikimedia.org/wikipedia/commons/a/a5/Into_the_Jaws_of_Death_23-0455M_edit.jpg",
opzioni:["Normandia","Sicilia","Grecia"],
corretta:0,
aiuto:"Sbarco = arrivare dal mare con le navi."
},

{
domanda:"Quale città fu colpita dalla bomba atomica?",
img:"https://upload.wikimedia.org/wikipedia/commons/5/54/Atomic_bomb_mushroom_cloud.jpg",
opzioni:["Hiroshima","Tokyo","Pechino"],
corretta:0,
aiuto:"Bomba atomica = arma molto potente."
},

{
domanda:"Chi era il capo del Regno Unito?",
img:"https://upload.wikimedia.org/wikipedia/commons/1/1e/Winston_Churchill_1941.jpg",
opzioni:["Churchill","Lincoln","Kennedy"],
corretta:0,
aiuto:"Primo ministro = capo del governo."
},

{
domanda:"Germania, Italia e Giappone formavano?",
img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Tripartite_Pact_signing.jpg",
opzioni:["Asse","ONU","NATO"],
corretta:0,
aiuto:"Alleanza = paesi uniti insieme."
},

{
domanda:"Quando finì la guerra in Europa?",
img:"https://upload.wikimedia.org/wikipedia/commons/5/5d/V-E_Day_in_London_1945.jpg",
opzioni:["1940","1945","1950"],
corretta:1,
aiuto:"Fine guerra = pace."
},

{
domanda:"Cosa divideva Berlino dopo la guerra?",
img:"https://upload.wikimedia.org/wikipedia/commons/f/f0/Berlinermauer.jpg",
opzioni:["Un muro","Un fiume","Una montagna"],
corretta:0,
aiuto:"Dividere = separare due parti."
}

];

//////////////// MOSTRA //////////////////

function mostra(){

if(i>=quiz.length){
fine();
return;
}

let q=quiz[i];

document.getElementById("schermata").innerHTML=`

<div class="box">

<h2>Stanza ${i+1}/10</h2>

<img src="${q.img}">

<p>${q.domanda}</p>

${q.opzioni.map((o,index)=>
`<button onclick="risposta(${index})">${o}</button>`
).join("")}

<button onclick="spiega()">💡 Parola difficile</button>
<button onclick="parlaDomanda()">🔊 Ascolta</button>

<div id="aiuto"></div>

</div>
`;
}

function parlaDomanda(){
parla(quiz[i].domanda);
}

function spiega(){
document.getElementById("aiuto").innerHTML=
`<div class="spiegazione">${quiz[i].aiuto}</div>`;
parla(quiz[i].aiuto);
}

function risposta(r){

if(r===quiz[i].corretta){
parla("Risposta corretta!");
i++;
setTimeout(mostra,1200);
}else{
parla("Riprova.");
}
}

function fine(){

document.getElementById("schermata").innerHTML=`

<div class="box">
<h1>🎉 Missione completata!</h1>

<p>
Hai imparato la storia e sei tornato nel presente!
</p>

<button onclick="intro()">Rigioca</button>

</div>
`;
}

function inizia(){
mostra();
}

intro();

</script>

</body>
</html>
